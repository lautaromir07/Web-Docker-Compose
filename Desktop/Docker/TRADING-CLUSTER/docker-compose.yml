version: '3.8'

services:
  # Base de Datos con persistencia (Simulando redundancia de datos)
  db:
    image: mariadb:10.6
    container_name: trading_db_node
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: trading_db
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - trading_data:/var/lib/mysql # Aquí está la "redundancia" de datos: si el contenedor muere, los datos viven
    networks:
      - trading_net

  # Instancia 1 del servidor web
  trading_web_1:
    build: ./web
    container_name: web_node_alpha
    restart: always
    depends_on:
      - db
    networks:
      - trading_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http:&#x2F;&#x2F;localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Instancia 2 del servidor web (Redundancia de cómputo)
  trading_web_2:
    build: ./web
    container_name: web_node_beta
    restart: always
    depends_on:
      - db
    networks:
      - trading_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http:&#x2F;&#x2F;localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Balanceador de Carga (Punto de entrada único)
  loadbalancer:
    image: nginx:latest
    container_name: trading_proxy
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - trading_web_1
      - trading_web_2
    networks:
      - trading_net

volumes:
  trading_data:
    # Volumen persistente para simular RAID/Persistencia fuerte

networks:
  trading_net:
    driver: bridge
